name: Deploy OMR Test Bot

on:
  push:
    branches:
      - main  # deploy triggering branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Send Telegram notification on start
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID_DEPLOY }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN_DEPLOY }}
          message: |
            🚀 *OMR Test Bot: Deploy boshlandi!*
            
            *Repo:* ${{ github.repository }}
            *Branch:* `${{ github.ref_name }}`
            *Muallif:* ${{ github.actor }}
            *Commit habari:*
            `${{ github.event.head_commit.message }}`
            
            *Workflow:* [Click to View](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          format: markdown

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            # 1. Project directoryga o'tish (Serverdagi loyiha yo'lini kiriting)
            cd /var/www/omr-test-bot
            
            # 2. Eng so'nggi kodni olish
            git pull origin main
            
            # 3. Yangilangan Docker servicelarni qayta build va run qilish (downtimesiz)
            docker-compose up -d --build api bot worker
            
            # 4. DB migratsiyalarni ishga tushirish
            docker-compose exec -T api alembic upgrade head
            
            # 5. Disk to'lib qolmasligi uchun eski keraksiz docker imagelarni tozalash
            docker image prune -f

      - name: Send Telegram notification on success
        if: success()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID_DEPLOY }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN_DEPLOY }}
          message: |
            ✅ *OMR Test Bot: Deploy muvaffaqiyatli yakunlandi!* 🎉
            
            *Repo:* ${{ github.repository }}
            *Branch:* `${{ github.ref_name }}`
            *Commit:* `${{ github.sha }}`
            
            *Workflow:* [Click to View](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          format: markdown

      - name: Send Telegram notification on failure
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID_DEPLOY }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN_DEPLOY }}
          message: |
            ❌ *OMR Test Bot: Deployda xatolik yuz berdi!* ⚠️
            
            *Repo:* ${{ github.repository }}
            *Branch:* `${{ github.ref_name }}`
            *Commit:* `${{ github.sha }}`
            
            *Workflow:* [Click to View](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          format: markdown
