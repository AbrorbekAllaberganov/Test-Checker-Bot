
# Shared build context for all Python services
x-app-base: &app-base
  build:
    context: .
    dockerfile: Dockerfile
  env_file: .env
  volumes:
    - pdf_data:/data/pdfs
    - debug_data:/data/debug
    - temp_uploads:/tmp/omr_uploads
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  restart: unless-stopped

services:

  # ── PostgreSQL ────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-omruser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-omrpass}
      POSTGRES_DB: ${POSTGRES_DB:-omrdb}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-omruser} -d ${POSTGRES_DB:-omrdb}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── Redis ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # ── FastAPI (REST API) ────────────────────────────────────
  api:
    <<: *app-base
    environment:
      - SERVICE_NAME=api
    command: uvicorn app.api.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"

  # ── aiogram Bot ───────────────────────────────────────────
  bot:
    <<: *app-base
    environment:
      - SERVICE_NAME=bot
    command: python -m app.bot.main

  # ── Celery Worker ─────────────────────────────────────────
  worker:
    <<: *app-base
    environment:
      - SERVICE_NAME=worker
    command: >
      celery -A app.worker.celery_app worker
      --loglevel=info
      --concurrency=4
      -Q default

  # ── Flower (Celery monitoring) — ixtiyoriy ────────────────
  flower:
    <<: *app-base
    command: >
      celery -A app.worker.celery_app flower
      --port=5555
    ports:
      - "5555:5555"
    profiles:
      - monitoring

  # ── Grafana Loki (Log Ingestion) ──────────────────────────
  loki:
    image: grafana/loki:3.0.0
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped

  # ── Grafana (Log Visualization) ──────────────────────────
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - loki
    restart: unless-stopped

volumes:
  pg_data:
  redis_data:
  pdf_data:
  debug_data:
  temp_uploads:
